<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#6F4E37">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Thực Đơn Số</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --brown: #6F4E37;
      --cream: #FAF8F5;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, 'Helvetica Neue', Arial, sans-serif;
      background: var(--cream);
      color: #1e293b;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    .header {
      background: linear-gradient(135deg, #3d1f0f 0%, #6F4E37 55%, #8B6349 100%);
      color: white;
      padding: 20px 16px 16px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 20px rgba(111,78,55,0.35);
    }
    .header-top {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 14px;
    }
    .logo-circle {
      width: 50px; height: 50px; border-radius: 14px;
      background: rgba(255,255,255,0.18);
      border: 2px solid rgba(255,255,255,0.3);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; flex-shrink: 0; overflow: hidden;
    }
    .logo-circle img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .store-name { font-size: 18px; font-weight: 800; line-height: 1.2; }
    .store-addr { font-size: 11px; opacity: 0.75; margin-top: 2px; font-weight: 500; }
    .table-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: 9px; font-weight: 900;
      background: #f59e0b; color: white;
      padding: 2px 8px; border-radius: 10px;
      margin-top: 4px;
    }
    .lang-bar {
      display: flex; gap: 6px;
      overflow-x: auto; scrollbar-width: none; padding: 2px 0;
    }
    .lang-bar::-webkit-scrollbar { display: none; }
    .lang-btn {
      display: flex; align-items: center; gap: 4px;
      padding: 5px 11px; border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.3);
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
      font-size: 11px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      transition: all 0.18s;
      font-family: inherit;
    }
    .lang-btn:active { transform: scale(0.95); }
    .lang-btn.active {
      background: rgba(255,255,255,0.95);
      color: var(--brown); border-color: transparent;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .cat-bar {
      display: flex; gap: 8px;
      overflow-x: auto; scrollbar-width: none;
      padding: 12px 14px 10px;
      background: white;
      border-bottom: 1px solid #f1f5f9;
      position: sticky; top: 122px; z-index: 90;
    }
    .cat-bar::-webkit-scrollbar { display: none; }
    .cat-btn {
      padding: 5px 13px; border-radius: 18px;
      border: 1.5px solid #e2e8f0; background: white;
      color: #64748b; font-size: 11.5px; font-weight: 700;
      cursor: pointer; white-space: nowrap;
      transition: all 0.18s; font-family: inherit;
    }
    .cat-btn:active { transform: scale(0.95); }
    .cat-btn.active {
      background: var(--brown); color: white;
      border-color: var(--brown);
      box-shadow: 0 3px 10px rgba(111,78,55,0.25);
    }
    .content { padding: 12px 10px 80px; }
    .section-title {
      font-size: 11px; font-weight: 800;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--brown); padding: 8px 4px 8px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 9px;
    }
    @media (min-width: 460px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
    .product-card {
      background: white; border-radius: 14px; overflow: hidden;
      border: 1px solid #f1f5f9;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }
    .product-card:active { transform: scale(0.97); }
    .product-img-wrap {
      width: 100%; aspect-ratio: 4/3;
      background: linear-gradient(135deg, #fdf6ee, #f5e6d3);
      display: flex; align-items: center; justify-content: center;
      font-size: 34px; overflow: hidden;
    }
    .product-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .product-info { padding: 8px 9px 10px; }
    .product-name {
      font-size: 12px; font-weight: 800; color: #1e293b;
      line-height: 1.3; margin-bottom: 4px; min-height: 30px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .product-price { font-size: 13px; font-weight: 900; color: var(--brown); }
    .product-desc {
      font-size: 10px; color: #94a3b8; font-weight: 500;
      line-height: 1.4; margin-bottom: 4px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .product-card { position: relative; }
    .product-card.sold-out { opacity: 0.55; }
    .product-card.sold-out .product-img-wrap { filter: grayscale(1); }
    .sold-badge {
      position: absolute; top: 6px; right: 6px; z-index: 5;
      background: #e11d48; color: white;
      font-size: 8.5px; font-weight: 900;
      padding: 2px 7px; border-radius: 9px;
      box-shadow: 0 2px 6px rgba(225,29,72,0.35);
      text-transform: uppercase; letter-spacing: 0.03em;
    }
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 50vh; gap: 10px; color: #94a3b8;
      font-size: 13px; font-weight: 600;
      text-align: center;
      padding: 20px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #f1f5f9;
      border-top-color: var(--brown);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast {
      display: none;
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #1e293b; color: white;
      padding: 9px 18px; border-radius: 22px;
      font-size: 11.5px; font-weight: 700;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      z-index: 999; gap: 7px; align-items: center; white-space: nowrap;
    }
    .toast.visible { display: flex; }
    .footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: rgba(250,248,245,0.93);
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      border-top: 1px solid #f1f5f9;
      padding: 9px 16px; text-align: center;
      font-size: 10px; color: #94a3b8; font-weight: 600;
    }
  </style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div class="logo-circle" id="logo-wrap">☕</div>
    <div>
      <div class="store-name" id="store-name">Thực Đơn</div>
      <div class="store-addr" id="store-addr"></div>
      <div class="table-badge" id="table-badge" style="display:none">Bàn...</div>
    </div>
  </div>
  <div class="lang-bar">
    <button class="lang-btn active" data-lang="vi" onclick="switchLang('vi')">🇻🇳 Việt</button>
    <button class="lang-btn" data-lang="en" onclick="switchLang('en')">🇺🇸 EN</button>
    <button class="lang-btn" data-lang="zh-CN" onclick="switchLang('zh-CN')">🇨🇳 中文</button>
    <button class="lang-btn" data-lang="ko" onclick="switchLang('ko')">🇰🇷 한국어</button>
    <button class="lang-btn" data-lang="ja" onclick="switchLang('ja')">🇯🇵 日本語</button>
    <button class="lang-btn" data-lang="fr" onclick="switchLang('fr')">🇫🇷 FR</button>
    <button class="lang-btn" data-lang="ru" onclick="switchLang('ru')">🇷🇺 RU</button>
  </div>
</header>

<div class="cat-bar" id="cat-bar"></div>
<div class="content" id="content">
  <div class="empty-state"><div class="spinner"></div><span>Đang tải thực đơn từ đám mây...</span></div>
</div>

<div class="toast" id="toast">
  <div class="spinner" style="width:14px;height:14px;border-width:2px;border-top-color:white"></div>
  <span id="toast-text">Đang dịch...</span>
</div>

<footer class="footer" id="footer"></footer>

<script>
// ---- OFFLINE PWA CACHING FOR CLOUD MENU ----
let allProducts = [];
let allCategories = [];
let storeInfo = {};
let currentLang = localStorage.getItem('gm_lang') || 'vi';
let currentCat = 'all';
let transCache = {};
try { transCache = JSON.parse(localStorage.getItem('gm_trans') || '{}'); } catch(e) {}
let tNames = {}, tCats = {};

// Parse URL Parameters
const urlParams = new URLSearchParams(window.location.search);
const blobId = urlParams.get('id');
const tableName = urlParams.get('table');

if (tableName) {
  const tb = document.getElementById('table-badge');
  tb.textContent = '📍 ' + decodeURIComponent(tableName);
  tb.style.display = 'inline-flex';
}

// Live-data source: the POS server's public tunnel URL, published inside the blob.
// When the POS machine is online we read fresh data straight from it; the blob
// is the fallback snapshot for when the POS is switched off.
let posPublicUrl = '';

function applyMenuData(data) {
  const changed =
    JSON.stringify(data.products) !== JSON.stringify(allProducts) ||
    JSON.stringify(data.categories) !== JSON.stringify(allCategories) ||
    JSON.stringify(data.store) !== JSON.stringify(storeInfo);
  if (!changed) return;
  allProducts = data.products || [];
  allCategories = data.categories || [];
  storeInfo = data.store || storeInfo;
  if (currentCat !== 'all' && !allProducts.some(p => p.category === currentCat)) currentCat = 'all';
  init();
}

async function tryFreshFromPos() {
  if (!posPublicUrl) return;
  try {
    const ctrl = new AbortController();
    const timer = setTimeout(() => ctrl.abort(), 6000);
    const r = await fetch(posPublicUrl.replace(/\/+$/, '') + '/api/public-menu', { signal: ctrl.signal, cache: 'no-store' });
    clearTimeout(timer);
    if (!r.ok) return;
    applyMenuData(await r.json());
  } catch(e) { /* POS offline: blob snapshot stays on screen */ }
}

function bootWithData(data) {
  allProducts = data.products || [];
  allCategories = data.categories || [];
  storeInfo = data.store || {};
  posPublicUrl = data.publicUrl || '';
  init();
  // Upgrade to live POS data when available, then keep it fresh
  tryFreshFromPos();
  setInterval(tryFreshFromPos, 60000);
}

function showLoadError() {
  document.getElementById('content').innerHTML = `
    <div class="empty-state">
      ⚠️ <strong>Lỗi tải thực đơn</strong><br>
      Không thể tải dữ liệu thực đơn. Vui lòng kiểm tra lại kết nối mạng và thử lại.
    </div>
  `;
}

async function loadInitialData() {
  // Primary source: menu.json deployed next to this page (GitHub Pages).
  // The POS pushes it automatically on every menu change.
  try {
    const r = await fetch('./menu.json?v=' + Date.now(), { cache: 'no-store' });
    if (r.ok) {
      bootWithData(await r.json());
      return;
    }
  } catch(e) { /* fall through to legacy source */ }

  // Legacy fallback: JSONBlob snapshot addressed by ?id= (old printed QR codes)
  if (blobId) {
    try {
      const r = await fetch(`https://api.jsonblob.com/api/jsonBlob/${blobId}`);
      if (r.ok) {
        bootWithData(await r.json());
        return;
      }
    } catch(e) { /* fall through to error state */ }
  }

  showLoadError();
}

loadInitialData();

function init() {
  const s = storeInfo;
  document.getElementById('store-name').textContent = s.name || 'Thực Đơn';
  document.getElementById('store-addr').textContent = s.address || '';
  const lw = document.getElementById('logo-wrap');
  if (s.logoUrl) {
    lw.innerHTML = '<img src="' + s.logoUrl + '" alt="logo" onerror="this.parentNode.textContent=\'☕\'">';
  } else {
    lw.textContent = s.logoEmoji || '☕';
  }
  const phone = s.phone ? ' • ☎ ' + s.phone : '';
  document.getElementById('footer').textContent = s.name + phone;
  document.title = s.name + ' - Thực Đơn';

  allProducts.forEach(p => { tNames[p.id] = p.name; });
  allCategories.forEach(c => { tCats[c] = c; });

  document.querySelectorAll('.lang-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.lang === currentLang));

  if (currentLang !== 'vi') {
    applyTranslation(currentLang);
  } else {
    renderCategories();
    renderProducts();
  }
}

function fmt(p) { return p.toLocaleString('vi-VN') + 'đ'; }

function renderCategories() {
  const used = [...new Set(allProducts.map(p => p.category))];
  const all_labels = { vi:'Tất cả', en:'All', 'zh-CN':'全部', ko:'전체', ja:'すべて', fr:'Tout', ru:'Все' };
  let html = '<button class="cat-btn ' + (currentCat==='all'?'active':'') + '" onclick="filterCat(\'all\')">' + (all_labels[currentLang]||'Tất cả') + '</button>';
  used.forEach(c => {
    html += '<button class="cat-btn ' + (currentCat===c?'active':'') + '" onclick="filterCat(\'' + c + '\')">' + (tCats[c]||c) + '</button>';
  });
  document.getElementById('cat-bar').innerHTML = html;
}

function filterCat(cat) { currentCat = cat; renderCategories(); renderProducts(); }

function renderProducts() {
  const list = currentCat === 'all' ? allProducts : allProducts.filter(p => p.category === currentCat);
  if (!list.length) {
    document.getElementById('content').innerHTML = '<div class="empty-state">🍽️ Không có món nào</div>';
    return;
  }
  let html = '';
  if (currentCat === 'all') {
    const grouped = {};
    list.forEach(p => { (grouped[p.category] = grouped[p.category]||[]).push(p); });
    Object.keys(grouped).forEach(cat => {
      html += '<div class="section-title">' + (tCats[cat]||cat) + '</div>';
      html += '<div class="product-grid">' + grouped[cat].map(card).join('') + '</div><div style="height:16px"></div>';
    });
  } else {
    html = '<div class="product-grid">' + list.map(card).join('') + '</div>';
  }
  document.getElementById('content').innerHTML = html;
}

const SOLD_OUT_LABELS = { vi:'Hết món', en:'Sold out', 'zh-CN':'售罄', ko:'품절', ja:'売り切れ', fr:'Épuisé', ru:'Продано' };

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function card(p) {
  const name = tNames[p.id] || p.name;
  const em = p.emoji || '🍽️';
  const soldOut = p.available === false;
  const img = p.image
    ? '<img src="' + p.image + '" alt="" loading="lazy" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'">' +
      '<span style="display:none;align-items:center;justify-content:center;width:100%;height:100%;font-size:32px">' + em + '</span>'
    : '<span style="font-size:32px">' + em + '</span>';
  const desc = p.description ? '<div class="product-desc">' + esc(p.description) + '</div>' : '';
  const badge = soldOut ? '<div class="sold-badge">' + (SOLD_OUT_LABELS[currentLang] || SOLD_OUT_LABELS.vi) + '</div>' : '';
  return '<div class="product-card' + (soldOut ? ' sold-out' : '') + '">' + badge +
    '<div class="product-img-wrap">' + img + '</div>' +
    '<div class="product-info"><div class="product-name">' + name + '</div>' + desc +
    '<div class="product-price">' + fmt(p.price) + '</div></div></div>';
}

function switchLang(lang) {
  if (lang === currentLang) return;
  currentLang = lang;
  localStorage.setItem('gm_lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  if (lang === 'vi') {
    allProducts.forEach(p => { tNames[p.id] = p.name; });
    allCategories.forEach(c => { tCats[c] = c; });
    renderCategories(); renderProducts();
    return;
  }
  applyTranslation(lang);
}

async function translateBatch(texts, lang) {
  if (!transCache[lang]) transCache[lang] = {};
  const need = texts.filter(t => !transCache[lang][t]);
  if (!need.length) return texts.map(t => transCache[lang][t] || t);
  try {
    const url = 'https://translate.googleapis.com/translate_a/single?client=gtx&sl=vi&tl=' + lang + '&dt=t&q=' + encodeURIComponent(need.join('\\n'));
    const data = await (await fetch(url)).json();
    let out = '';
    if (data && data[0]) data[0].forEach(x => { if (x[0]) out += x[0]; });
    const lines = out.split('\\n');
    need.forEach((t, i) => { transCache[lang][t] = (lines[i]||t).trim(); });
    localStorage.setItem('gm_trans', JSON.stringify(transCache));
  } catch(e) {
    need.forEach(t => { transCache[lang][t] = t; });
  }
  return texts.map(t => transCache[lang][t] || t);
}

async function applyTranslation(lang) {
  const msgs = { en:'Translating...', 'zh-CN':'翻译中...', ko:'번역 중...', ja:'翻訳中...', fr:'Traduction...', ru:'Перевод...' };
  showToast(msgs[lang] || 'Translating...');
  const names = allProducts.map(p => p.name);
  const cats = [...new Set(allProducts.map(p => p.category))];
  const all = await translateBatch([...names, ...cats], lang);
  allProducts.forEach((p, i) => { tNames[p.id] = all[i] || p.name; });
  cats.forEach((c, i) => { tCats[c] = all[names.length + i] || c; });
  hideToast();
  renderCategories(); renderProducts();
}

function showToast(msg) {
  document.getElementById('toast-text').textContent = msg;
  document.getElementById('toast').classList.add('visible');
}
function hideToast() { document.getElementById('toast').classList.remove('visible'); }
</script>
</body>
</html>
